# Cloud Build configuration for govreposcrape-api
# Triggered on: git push to main branch
# Deploys to: Cloud Run (us-central1)

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker@sha256:6c9b879570fe1c63a78af0b575ca5ac52f6c2c7e25f76f91ae1f2d6cb2a872ee'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:latest'
      - '--file'
      - 'api/Dockerfile'
      - './api'
    id: 'build-image'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker@sha256:6c9b879570fe1c63a78af0b575ca5ac52f6c2c7e25f76f91ae1f2d6cb2a872ee'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker@sha256:6c9b879570fe1c63a78af0b575ca5ac52f6c2c7e25f76f91ae1f2d6cb2a872ee'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:latest'
    id: 'push-latest'
    waitFor: ['build-image']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud@sha256:ed65a62c56e73168e4adc4456139a8b47844a304a68a5b94b3b18fd325d7f4ca'
    args:
      - 'run'
      - 'deploy'
      - 'govreposcrape-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'govreposcrape-api@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'VERTEX_AI_SEARCH_ENGINE_ID=projects/1060386346356/locations/global/collections/default_collection/engines/govreposcrape-search,GOOGLE_PROJECT_ID=$PROJECT_ID,NODE_ENV=production,ALLOWED_ORIGINS=*,ENABLE_GEMINI_FEATURES=false,DEPS_DATASET=govreposcrape_deps,DEPS_LOCATION=US'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '30s'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--concurrency'
      - '80'
    id: 'deploy-cloud-run'
    waitFor: ['push-image']

  # Step 5: Verify health endpoint
  - name: 'gcr.io/cloud-builders/curl@sha256:7a9df6895c161fda4d7ec88e6394f71ecd973b35f6fbf344c7ff1c2739474023'
    args:
      - '--fail'
      - '--silent'
      - '--show-error'
      - '--retry'
      - '5'
      - '--retry-delay'
      - '10'
      - 'https://govreposcrape-api-1060386346356.us-central1.run.app/health'
    id: 'verify-health'
    waitFor: ['deploy-cloud-run']

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/govreposcrape-api:latest'

# Cloud Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Timeout for entire build process
timeout: '1200s'
