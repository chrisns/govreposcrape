# Cloud Build configuration for govreposcrape-api
# Triggered on: git push to main branch
# Deploys to: Cloud Run (us-central1)

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker@sha256:f3fbbf341975ab4f08a7511f73f60f1e00bc203cd7daa79f9eeabe4b6c334fb3'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:latest'
      - '--file'
      - 'api/Dockerfile'
      - './api'
    id: 'build-image'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker@sha256:f3fbbf341975ab4f08a7511f73f60f1e00bc203cd7daa79f9eeabe4b6c334fb3'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker@sha256:f3fbbf341975ab4f08a7511f73f60f1e00bc203cd7daa79f9eeabe4b6c334fb3'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:latest'
    id: 'push-latest'
    waitFor: ['build-image']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud@sha256:8da9de84573d9a2ab150fd10a1ed38fdb27065f8020bcfe1cb49f8456db42ced'
    args:
      - 'run'
      - 'deploy'
      - 'govreposcrape-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'govreposcrape-api@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'VERTEX_AI_SEARCH_ENGINE_ID=projects/1060386346356/locations/global/collections/default_collection/engines/govreposcrape-search,GOOGLE_PROJECT_ID=$PROJECT_ID,NODE_ENV=production,ALLOWED_ORIGINS=*,ENABLE_GEMINI_FEATURES=false,DEPS_DATASET=govreposcrape_deps,DEPS_LOCATION=US'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '30s'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--concurrency'
      - '80'
    id: 'deploy-cloud-run'
    waitFor: ['push-image']

  # Step 5: Verify health endpoint
  - name: 'gcr.io/cloud-builders/curl@sha256:55fa8d6e0aee32958193571034bd03b578a0505a04f5f4da1ccf255b2a295255'
    args:
      - '--fail'
      - '--silent'
      - '--show-error'
      - '--retry'
      - '5'
      - '--retry-delay'
      - '10'
      - 'https://govreposcrape-api-1060386346356.us-central1.run.app/health'
    id: 'verify-health'
    waitFor: ['deploy-cloud-run']

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/govreposcrape-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/govreposcrape-api:latest'

# Cloud Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Timeout for entire build process
timeout: '1200s'
